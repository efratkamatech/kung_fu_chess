name: CI

# Run the same checks we run locally -- ruff and the pytest suite with the 100%
# coverage gate -- on every push to main and on every pull request, so the bar is
# enforced automatically instead of by remembering to run it.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch cancels an in-progress run for it.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # A modern spread; the project declares requires-python >=3.8, so older
        # versions can be added here if you want to verify that floor too.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"
          # The suite imports the OpenCV rendering layer at collection, so cv2 must be
          # importable. Use the *headless* build here: it needs no GUI system libraries
          # and imports cleanly on a runner, and the tests never open a real window (that
          # code is excluded from coverage). Real users get the full opencv-python from
          # the project's "graphics" extra.
          pip install opencv-python-headless

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test with coverage (fails under 100%)
        run: pytest --cov=kfchess --cov-report=term-missing
